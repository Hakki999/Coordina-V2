<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Controle de Materiais</title>

  <link rel="shortcut icon" href="/common/assets/logoIcon.png" type="image/x-icon">

  <link rel="stylesheet" href="/common/styles/global.css" />
  <link rel="stylesheet" href="/common/styles/messages.css">
  <link rel="stylesheet" href="/pages/login/style.css" />
  
</head>

<body class="login-page">

  <button id="btnTemaLogin" class="theme-login theme-switch" type="button" role="switch" aria-checked="false">
    <span class="theme-icon" aria-hidden="true">☼</span>
    <span class="theme-label">Claro</span>
    <span class="switch-track"><span class="switch-thumb"></span></span>
  </button>

  <main class="login-container">

    <section class="login-card">

      <div class="login-logo">
        C
      </div>

      <h1 class="login-title">
        Controle de Materiais
      </h1>

      <p class="login-subtitle">
        Entre com seu usuário e senha para acessar o sistema.
      </p>

      <div id="loginError" class="login-error">
        Usuário ou senha inválidos.
      </div>

      <form id="formLogin" class="login-form">

        <div class="form-group">
          <label for="nome">Usuário</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu usuário" autocomplete="username" required />
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>

          <div class="password-wrapper">
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" autocomplete="current-password" required />

            <button type="button" id="toggleSenha" class="toggle-password" title="Mostrar senha">Mostrar</button>
          </div>
        </div>

        <div class="login-actions">
          <button type="submit" class="login-button">
            Entrar
          </button>
        </div>

      </form>

      <div class="login-footer">
        <span>
          Sistema interno • <strong>Controle de Materiais</strong>
        </span>
      </div>

    </section>

  </main>

  <script src="/common/scripts/messages.js"></script>
  <script src="/pages/login/script.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Solicitações | Controle de Materiais</title>

  <link rel="shortcut icon" href="./img/logoIcon.png" type="image/x-icon">

  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/solicitacoes.css" />
</head>

<body>
  <div class="app-layout">

    <aside class="sidebar">

      <div class="sidebar-header">
        <div class="sidebar-logo">CM</div>

        <div>
          <h2>Controle</h2>
          <span>Materiais</span>
        </div>
      </div>

      <nav class="sidebar-nav">

        <a href="/home.html" class="nav-link" id="home">
          <span class="nav-icon">🏠</span>
          <span>Home</span>
        </a>

        <a href="/solicitar-materiais.html" class="nav-link " id="solicitarMateriais">
          <span class="nav-icon">📦</span>
          <span>Solicitar materiais</span>
        </a>

        <a href="/solicitacoes.html" class="nav-link active" id="solicitacoes">
          <span class="nav-icon">📋</span>
          <span>Solicitações</span>
        </a>

        <a href="/configuracoes.html" class="nav-link" id="configuracoes">
          <span class="nav-icon">⚙️</span>
          <span>Configurações</span>
        </a>

        <a href="/novo-usuario.html" class="nav-link" id="novoUsuario">
          <span class="nav-icon">👤</span>
          <span>Gerar novo usuário</span>
        </a>

      </nav>

      <div class="sidebar-footer">
        <button id="btnLogout" class="logout-button">
          <span>🚪</span>
          <span>Sair</span>
        </button>
      </div>

    </aside>

    <main class="solicitacoes-page">

      <section class="card filtros-card">

        <div class="filtros-grid">

          <div class="form-group">
            <label for="buscaGeral">Pesquisar</label>
            <input type="text" id="buscaGeral" placeholder="Projeto, cidade, equipe ou observação..." />
          </div>

          <div class="form-group">
            <label for="filtroCidade">Cidade</label>
            <select id="filtroCidade">
              <option value="">Todas</option>
            </select>
          </div>

          <div class="form-group">
            <label for="filtroEquipe">Equipe</label>
            <select id="filtroEquipe">
              <option value="">Todas</option>
            </select>
          </div>

          <div class="form-group">
            <label for="filtroStatus">Status</label>
            <select id="filtroStatus">
              <option value="">Todos</option>
              <option value="pendente">Pendente</option>
              <option value="separado">Separado</option>
              <option value="entregue">Entregue</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>

          <div class="form-group">
            <label for="filtroTipo">Tipo de serviço</label>
            <select id="filtroTipo">
              <option value="">Todos</option>
              <option value="Emergência">Emergência</option>
              <option value="Manutenção">Manutenção</option>
              <option value="Obras">Obras</option>
              <option value="Reposição">Reposição</option>
              <option value="Leve">Leve</option>
            </select>
          </div>

          <div class="form-group">
            <label for="dataInicio">Data inicial</label>
            <input type="date" id="dataInicio" />
          </div>

          <div class="form-group">
            <label for="dataFim">Data final</label>
            <input type="date" id="dataFim" />
          </div>

          <div class="filtros-actions">
            <button id="btnLimparFiltros" type="button" class="btn-secondary">
              Limpar filtros
            </button>
          </div>

        </div>

      </section>

      <section class="card tabela-card">

        <div class="tabela-header">
          <div>
            <h3>Lista de solicitações</h3>
            <p id="contadorSolicitacoes">0 solicitações encontradas</p>
          </div>
        </div>

        <div class="table-wrapper solicitacoes-table-wrapper">
          <table class="solicitacoes-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Projeto</th>
                <th>Cidade</th>
                <th>Equipe</th>
                <th>Tensão</th>
                <th>Execução</th>
                <th>Tipo</th>
                <th>Status</th>
                <th>Ações</th>
              </tr>
            </thead>

            <tbody id="tabelaSolicitacoes">
              <tr>
                <td colspan="9" class="empty-row">
                  Carregando solicitações...
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </section>

    </main>

  </div>
  <section id="modalMateriais" class="modal hidden">

    <div class="modal-card modal-materiais-card">


      <div class="modal-body">

        <div id="resumoSolicitacao" class="resumo-solicitacao">
          <!-- Gerado pelo JS -->
        </div>

        <div class="table-wrapper materiais-modal-wrapper">
          <table class="materiais-modal-table">
            <thead>
              <tr>
                <th>Descrição</th>
                <th>Quantidade</th>
              </tr>
            </thead>

            <tbody id="tabelaMateriaisModal">
              <tr>
                <td colspan="2" class="empty-row">
                  Nenhum material encontrado.
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>

    </div>

  </section>

  <script src="./js/messages.js"></script>
  <script src="./js/imprimir.js"></script>
  <script src="./js/solicitacoes.js"></script>
</body>

</html>

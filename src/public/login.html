<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Login | Controle de Materiais</title>

  <link rel="shortcut icon" href="./img/logoIcon.png" type="image/x-icon">

  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/login.css" />
  <link rel="stylesheet" href="/css/messages.css">
  
</head>

<body class="login-page">

  <main class="login-container">

    <section class="login-card">

      <div class="login-logo">
        C
      </div>

      <h1 class="login-title">
        Controle de Materiais
      </h1>

      <p class="login-subtitle">
        Entre com seu usuário e senha para acessar o sistema.
      </p>

      <div id="loginError" class="login-error">
        Usuário ou senha inválidos.
      </div>

      <form id="formLogin" class="login-form">

        <div class="form-group">
          <label for="nome">Usuário</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu usuário" autocomplete="username" required value="José Miguel"/>
        </div>

        <div class="form-group">
          <label for="senha">Senha</label>

          <div class="password-wrapper">
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha" autocomplete="current-password" required value="123456"/>

            <button type="button" id="toggleSenha" class="toggle-password" title="Mostrar senha">
              👁
            </button>
          </div>
        </div>

        <div class="login-actions">
          <button type="submit" class="login-button">
            Entrar
          </button>
        </div>

      </form>

      <div class="login-footer">
        <span>
          Sistema interno • <strong>Controle de Materiais</strong>
        </span>
      </div>

    </section>

  </main>

  <script src="/js/messages.js"></script>
  <script src="./js/login.js"></script>
</body>

</html>
